<model-viewer 
    id="model-viewer"
    shadow-intensity="1" 
    ar 
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls 
    alt="3D model carousel">

  <button slot="ar-button" id="ar-button">View in your space</button>

  <div id="ar-prompt">
    <img src="assets/hand.png">
  </div>

  <button id="ar-failure">AR is not tracking!</button>

  <div class="slider">
      <div class="slides" id="slides-container"></div>
  </div>
</model-viewer>

<script type="module">
  const modelViewer = document.querySelector("#model-viewer");
  const slidesContainer = document.getElementById("slides-container");

  // Shared models mapped to SharePoint direct download URLs
  const models = {
    "Male_Pelvis_Pixel_9XL": {
      glb: "https://baylor0-my.sharepoint.com/:u:/g/personal/b_harper_baylor_edu1/IQCnRJ6-YDXFT5SX_dng2HUOAa6OBCLBCAOTvRFO6EpTNF4?download=1",
      png: "https://baylor0-my.sharepoint.com/:i:/g/personal/b_harper_baylor_edu1/IQAvZvSX1nePTIMqPLfmuhtXAQ8XRhDNIv_3sa0er3g3BBU?download=1"
    }
  };

  const modelNames = Object.keys(models);
  if (modelNames.length > 0) {
    // Load the first model by default
    modelViewer.src = models[modelNames[0]].glb;
    modelViewer.poster = models[modelNames[0]].png;
  }

  modelNames.forEach((name, index) => {
    const button = document.createElement("button");
    button.classList.add("slide");
    if (index === 0) button.classList.add("selected");
    button.style.backgroundImage = `url('${models[name].png}')`;
    button.addEventListener("click", () => {
      modelViewer.src = models[name].glb;
      modelViewer.poster = models[name].png;
      document.querySelectorAll(".slide").forEach(el => el.classList.remove("selected"));
      button.classList.add("selected");
    });
    slidesContainer.appendChild(button);
  });

  document.querySelector(".slider").addEventListener('beforexrselect', ev => ev.preventDefault());
</script>
